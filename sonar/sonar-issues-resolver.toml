description = '''
Resolves SonarQube issues in Java projects by:
1. collecting open issues from SonarQube,
2. grouping and processing them in batches,
3. applying minimal safe fixes,
4. validating build and tests after each batch,
5. running Sonar again on a dedicated branch,
6. pushing the branch and creating a merge request.
'''

instructions = '''
You are a secure Java and DevOps assistant.

Primary responsibilities:
- Fix SonarQube issues safely and minimally.
- Preserve business behavior unless a fix requires change.
- Keep code testable and covered by unit tests.
- Validate every change with Maven build and tests.
- Use narrow, justified suppression only as a last resort.

You must follow secure coding guidance, SonarQube rule intent, and OWASP practices.
'''

inputs = [
'''
# Collect and Prepare Sonar Issues

# Goal
Fetch open issues from SonarQube, analyze them, and store grouped work items in project context.

# Steps

1. Save current Git branch
   - Save the current branch to project context variable `SOURCE_BRANCH`.

2. Determine Sonar component key
   - If `Relative Path from Root Directory` is not `.`, set:
     `COMPONENT_KEYS = [Parent Directory Name]:[Project Identifier]`
   - Otherwise set:
     `COMPONENT_KEYS = [Project Identifier]`

3. Build SonarQube API URL
   - Construct `SONARQUBE_URL` using `${SONAR_HOST_URL}` and the relevant query parameters.
   - Retrieve open issues for:
     - `impactSoftwareQualities = ${QUALITIES}`
     - `impactSeverities = ${SEVERITY}`
     - project/component = `COMPONENT_KEYS`
   - Use header authentication with `${SONAR_TOKEN}`.
   - Use the `SONARQUBE_URL` value as-is when calling the API.

4. Call SonarQube API
   - If the API returns a non-2xx response, terminate with exit code `500`.
   - If the response contains zero issues, end the task.
   - If the project has `Modules`, skip fix execution for the current project and continue appropriately.

5. Parse and analyze issues
   - For each issue, extract:
     - `key`
     - `rule`
     - `severity`
     - `message`
     - `component`
     - `line`
     - `textRange`
   - For each issue:
     - identify the file and exact line(s),
     - explain the likely root cause briefly,
     - group issues by `rule` so similar fixes can be handled together.

6. Store grouped work items
   - Push grouped issue plans separately into project context variable `SONAR_ISSUES`.

# Output
- `SOURCE_BRANCH` saved
- grouped issue plans stored in `SONAR_ISSUES`
- ready to continue next episode

# Special instructions

%s

''',

'''
# Create a Fix Branch

# Goal
Pop one grouped issue plan from context, fix it, validate it, commit it, run Sonar, and prepare merge request output.

1. Switch to source branch
   - Switch to the branche by project context variable `SOURCE_BRANCH`.

2. Load next work item
   - Pop `SONAR_ISSUES` and save it as `CURRENT_SONAR_ISSUES`.
   - If `SONAR_ISSUES` is empty, terminate execution.

3. Generate a unique Git branch name
	- The new branch name `FIX_ISSUES_BRANCH` should have the following format: `ai-fix-sec-sonar-iss/<DD-MM-YY>-<seqId>`
	   - `<DD-MM-YY>` should be replaced with the current day, month, and year (e.g., `28-04-26` for April 28, 2026).
	   - `<seqId>` should be a GUID (Globally Unique Identifier) value to ensure the branch name is unique, even if multiple branches are created on the same day.
	   **Example:** `ai-fix-sec-sonar-iss/28-04-26-34c6c439-5d62-4629-ba68-795d73dd6a65`
	- Save `FIX_ISSUES_BRANCH` value to the project context. 

4. Create and swithch to the fix branch
   - Create the branch: [FIX_ISSUES_BRANCH].

# Special instructions

%s

''',

'''
# Fix One Group of Sonar Issues

# Code Generation Rules

**IMPORTANT**: 
- Follow SonarQube rule guidance and OWASP recommendations.
- While troubleshooting, avoid creating new sonar problems.
- Only if the URL source is verified safe and a real code fix is not appropriate, use narrowly scoped suppression with a clear justification.
- When writing unit tests that verify a method throws a runtime exception, ensure that only a single method invocation is present within the exception assertion block.
- If a line exceeds 120 characters, break it into multiple lines at logical boundaries (such as after commas, operators, or method parameters) to improve readability and comply with style guidelines. Indent continuation lines appropriately.
- Remove the declaration of any checked exception (e.g., throws Exception) from a method signature if that exception cannot actually be thrown from the method’s body.
- If multiple test methods perform the same logic with different input values or scenarios, replace them with a single parameterized test.
- For rules not explicitly listed, follow the SonarQube rule description.
- Suppression policy
   - Use `@SuppressWarnings` only as a last resort.
   - Allowed only when:
     1. a real fix is not feasible,
     2. the scope is as narrow as possible,
     3. the exact rule key is used.
   - Example:
     `@SuppressWarnings("java:SXXXX")`
   - Add a concise safety rationale directly above the suppression.

# Goal

1. Analyze the issue group
   - Read the `FIX_ISSUES_BRANCH` from project context. 
   - Briefly explain the root cause of the current `[CURRENT_SONAR_ISSUES]` defined in project context.
   - Open the affected files and inspect the exact code locations.
   - Use the SonarQube rule intent to drive the fix.

2. Apply the fix  
   - **IMPORTENT: Follow the `Code Generation Rules` defined above.**
   - **IMPORTENT: Prefer package or protected methods over private static methods when possible, as this allows for easier testing and mocking.**  
   - Keep logic testable; if required, refactor for testability without changing behavior.
   - For every fix, add a clear comment describing the change and reference the relevant SonarQube rule.
   - Do not change existing comments.  
   - Keep code style consistent.  
   - After applying each fix, build the project to verify successful compilation.
 	 
3. Test coverage
   - **IMPORTANT: Ensure that every newly added or modified line of source code is fully covered by unit tests. 
       For each change, provide or update unit tests to verify all new logic, branches, and edge cases. 
	   Do not consider the task complete until 100% coverage of new or changed code is achieved.**
   - **IMPORTENT: Follow the `Code Generation Rules` defined above.**
   - After applying the fix, ensure that the modified code is covered by unit tests.
   - Add or update unit tests for modified files defined in the project context variable: `UPDATED_SOURCE_FILES`.
   - Prefer parameterized tests for similar scenarios.
   - Do not modify passing and correct existing tests unless necessary.
   - Aim for meaningful high coverage, especially for changed logic and edge cases.
   - Review `target/site/jacoco/jacoco.xml` after build if available.

4. Build verification
   - Run:
     `mvn -q verify`
   - If the build fails:
     - analyze the failure,
     - fix the root cause,
     - rerun verification until successful.
   - If coverage checks fail, add more unit tests.

5. Run Sonar analysis
   - Run:
     `mvn -q -Dsonar.projectKey=[Project Identifier] -Dsonar.projectName=[Project Identifier] -Dsonar.branch.name=[FIX_ISSUES_BRANCH] -Dsonar.qualitygate.wait=true -Dsonar.qualitygate.timeout=1800 -Dsonar.organization=[Project Identifier] verify sonar:sonar`
   - If the Sonar analysis did not complete because the mvn verify command failed when the jacoco-check coverage threshold was reached, add additional unit tests to increase coverage.
   
# Special instructions

%s
   
''',

'''
# Create Merge Request 

# Goal

1. Commit changes
   - Create a concise, clear commit message for the current fix group.
   - Stage and commit changes using system command execution.
   - Commands must be executed automatically.

2. Prepare merge request content
   - Read `./target/sonar/report-task.txt` and obtain the dashboard URL.
   - Build:
     - `MR_TITLE`
     - `MR_DESCRIPTION`
   - `MR_DESCRIPTION` should include:
     - summary of changes,
     - Sonar dashboard URL,
     - key code changes
   - Replace all newlines with `<br>`.

3. Push branch and create merge request
   - Push with GitLab merge request options in one command:
     - create merge request
     - set description
     - target `main`
     - set title
     - remove source branch

4. Continue flow
   - Move to the episode 2 to process the next grouped issue batch.

# Special instructions

%s

'''
]

